<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }
        h2 {
            color: #00ff88;
            margin-bottom: 20px;
        }
        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #0a0a0a;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #00ff88;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            border: none;
            border-radius: 8px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #00cc6a;
        }
        .error {
            color: #ff4444;
            margin-bottom: 15px;
        }
        .back-link {
            margin-top: 20px;
            display: block;
            color: #888;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit">Login</button>
        </form>
        <a href="/" class="back-link">← Back to site</a>
    </div>
</body>
</html>
