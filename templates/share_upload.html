<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Media</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .upload-box {
            background: #1a1a1a;
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h2 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 24px;
        }
        p {
            color: #888;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.05);
        }
        .upload-area h3 {
            color: white;
            margin-bottom: 10px;
        }
        .upload-area span {
            color: #666;
            font-size: 14px;
        }
        #fileInput {
            display: none;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="upload-box">
        <h2>Upload Your Media</h2>
        <p>Share a video or image to be featured!</p>

        <form method="POST" action="/share/{{ link_id }}/upload" enctype="multipart/form-data">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <h3>Click to select file</h3>
                <span>or drag and drop here</span>
                <input type="file" id="fileInput" name="file" accept="image/*,video/*" required>
            </div>
            <button type="submit" class="btn">Upload</button>
        </form>
    </div>
</body>
</html>
