<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Successful</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        .success-box {
            background: #1a1a1a;
            padding: 60px;
            border-radius: 20px;
            text-align: center;
        }
        h2 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 28px;
        }
        p {
            color: #888;
            font-size: 16px;
            line-height: 1.6;
        }
        .check {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="success-box">
        <div class="check">✓</div>
        <h2>Upload Successful!</h2>
        <p>Your media has been submitted and is waiting for approval.<br><br>It will appear on the site soon!</p>
    </div>
</body>
</html>
